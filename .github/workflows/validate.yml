name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check repo-local KAG index family
        uses: 8Dionysus/aoa-kag/.github/actions/repo-local-kag-index@b28f64a497fd440dd58cbaae90d655da46224d8c
        with:
          history-ref: ${{ github.event.pull_request.base.sha || github.event.before || format('{0}^', github.sha) }}
          event-history-ref: ${{ github.event.pull_request.base.sha || github.event.before || format('{0}^', github.sha) }}
      - uses: actions/checkout@v4
        with:
          repository: 8Dionysus/aoa-stats
          ref: 640882dbdd5588d7ecbc0085b1921ecbec207f5a
          path: .deps/aoa-stats
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pip install -r .deps/aoa-stats/requirements-dev.txt
      - run: python scripts/validate_local_stats_port.py
        env:
          AOA_STATS_ROOT: .deps/aoa-stats
      - run: python scripts/validate_connector.py
      - run: PYTHONPATH=src python -m pytest -q
