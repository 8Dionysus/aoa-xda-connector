name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check repo-local KAG source index
        uses: 8Dionysus/aoa-kag/.github/actions/repo-local-kag-index@34dded920a832a529cd9a71cee37454e17b0a790
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python scripts/validate_connector.py
      - run: PYTHONPATH=src python -m pytest -q
